<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JumpInto - Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

       const firebaseConfig = {
  apiKey: "AIzaSyDUIRfRRkBo6a0a2NH6sebeA172SWYhYB0",
  authDomain: "myquizapp-f7c58.firebaseapp.com",
  projectId: "myquizapp-f7c58",
  storageBucket: "myquizapp-f7c58.firebasestorage.app",
  messagingSenderId: "358827138605",
  appId: "1:358827138605:web:5bb7538a6cd676d62062a4",
  measurementId: "G-ZS5H9F9RS7"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let questions = [];
        let currentIdx = 0;

        async function loadQuestions() {
            const q = query(collection(db, "questions"), orderBy("createdAt", "asc"));
            const querySnapshot = await getDocs(q);
            querySnapshot.forEach((doc) => questions.push(doc.data()));
            if(questions.length > 0) showQuestion();
            else document.getElementById('qText').innerText = "কোনো প্রশ্ন পাওয়া যায়নি!";
        }

        function showQuestion() {
            const cur = questions[currentIdx];
            document.getElementById('qText').innerText = cur.question;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            // Progress bar update
            const progress = ((currentIdx) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + "%";

            cur.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 mb-3 text-left border-2 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition-all font-medium text-gray-700";
                btn.innerText = opt;
                btn.onclick = () => checkAns(opt, cur.answer);
                optDiv.appendChild(btn);
            });
        }

        function checkAns(selected, correct) {
            if(selected === correct) {
                currentIdx++;
                if(currentIdx < questions.length) {
                    showQuestion();
                } else {
                    document.getElementById('progress').style.width = "100%";
                    document.getElementById('quiz-card').innerHTML = "<h2 class='text-2xl font-bold text-center text-green-600'>অভিনন্দন! আপনি সবগুলো প্রশ্নের সঠিক উত্তর দিয়েছেন।</h2>";
                }
            } else {
                const res = document.getElementById('res');
                res.innerText = "ভুল উত্তর! আবার চেষ্টা করো।";
                setTimeout(() => res.innerText = "", 2000);
            }
        }

        window.onload = loadQuestions;
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-md mb-4">
        <div class="h-2 w-full bg-gray-200 rounded-full">
            <div id="progress" class="h-2 bg-blue-500 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
    </div>
    <div id="quiz-card" class="bg-white w-full max-w-md p-8 rounded-3xl shadow-lg border border-gray-100">
        <h2 id="qText" class="text-2xl font-bold text-gray-800 mb-8 leading-tight">লোড হচ্ছে...</h2>
        <div id="options"></div>
        <p id="res" class="text-red-500 text-center mt-4 font-bold h-6"></p>
    </div>
</body>
</html>
